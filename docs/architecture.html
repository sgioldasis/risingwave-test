<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RisingWave Real-Time Analytics — Architecture</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: auto;
  }
  h1 {
    text-align: center;
    padding: 22px 20px 4px;
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    padding-bottom: 14px;
  }
  .legend {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 18px; padding: 0 20px 16px; font-size: 0.74rem;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch {
    width: 18px; height: 18px; border: 2px solid; flex-shrink: 0;
  }
  .legend-swatch.app-shape { border-radius: 6px; }
  .legend-swatch.data-shape { border-radius: 50%; }
  .svg-wrap {
    width: 100%; overflow-x: auto; overflow-y: auto;
    padding: 0 10px 30px;
    max-height: calc(100vh - 120px);
    cursor: grab;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .svg-wrap::-webkit-scrollbar { display: none; }
  .svg-wrap:active, .svg-wrap.grabbing {
    cursor: grabbing;
  }
  #archSvg { display: block; }
  .arch-tooltip {
    position: fixed; display: none;
    background: #252836; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 0.74rem; color: var(--text);
    z-index: 1000; max-width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,.6);
    line-height: 1.55; pointer-events: none;
  }
</style>
</head>
<body>

<h1>Real-Time Streaming Architecture</h1>

<div id="archTooltip" class="arch-tooltip"></div>
<div class="svg-wrap">
  <svg id="archSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
// ═══════════════════════════════════════════════════════════

/* ── tiny SVG logo templates ─────────────────────────────── */

  rw:     c => `<svg viewBox="0 0 32 32" width="15" height="15"><rect width="32" height="32" rx="6" fill="#3b82f6"/><path d="M8 24c3-5 7-8 11-8 3 0 5 1.5 6 3.5M8 20c4-6 9-9 13-8 2 .5 4 2 5 4M12 26c2.5-3 5-4.5 8-4 1.5.3 2.5 1 3 2" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/><path d="M22 9c3.5 0 5.5 2.5 5 5.5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>`,
  ice:    c => `<svg viewBox="0 0 24 24" width="15" height="15" fill="${c}"><path d="M12 2l-8 18h16L12 2zm0 4l5.3 12H6.7L12 6z"/></svg>`,
  py:     c => `<svg viewBox="0 0 32 32" width="15" height="15"><path fill="#3776ab" d="M15.885 2.1c-3.6 0-6.7 1.2-7.7 3.3-.4.8-.5 1.7-.5 2.7v2.8H16v.8H3.385c-2.2 0-4.1 1.3-4.7 3.9 0 3.5 1.8 6.6 4.6 6.6h2.7v-3c0-2.5 2.1-4.7 4.7-4.7h7.5c2.1 0 3.8-1.7 3.8-3.8V8.1c0-2-1.7-4.3-3.9-4.3-1.3-.5-2.7-.7-4.2-.7zM11.685 5c.8 0 1.4.6 1.4 1.4s-.6 1.4-1.4 1.4-1.4-.6-1.4-1.4.6-1.4 1.4-1.4z"/><path fill="#ffd43b" d="M24.085 10.1v3.3c0 2.6-2.2 4.8-4.7 4.8h-7.5c-2.1 0-3.8 1.8-3.8 3.9v7.3c0 2.1 1.8 3.3 3.8 3.9 2.4.8 4.7.9 7.5 0 1.9-.6 3.8-1.8 3.8-3.9v-2.9h-7.5v-1h11.3c2.2 0 3-1.3 3.8-3.9.8-2.6.8-5.1 0-7.6-.6-1.9-1.7-3.2-3.9-3.2zM20.485 26.5c.8 0 1.4.6 1.4 1.4s-.6 1.4-1.4 1.4-1.4-.6-1.4-1.4.6-1.4 1.4-1.4z"/></svg>`,
  pg:     c => `<svg viewBox="0 0 32 32" width="15" height="15"><rect width="32" height="32" rx="6" fill="#fff"/><path fill="#336791" d="M16 3c-2.5 0-4.5 1-5.5 2.5C9.5 4.5 7.8 4 6.5 4 4.5 4 3 5.5 3 7.5c0 1.5.5 2.8 1.5 3.5-.5 1-.5 2.5-.2 4.2.5 2.5 2 5.5 3.8 7.5 1 1 2 1.5 3 1.5 1.2 0 2-.5 2.5-1 .5.3 1 .5 1.5.5.8 0 1.5-.3 2-.8.5.5 1.2.8 2 .8 2.5 0 5.5-2.5 7-6 1-2.5 1-5 0-7 0-2.5-2-4.5-4.5-4.5-.5 0-1 .1-1.5.2C19.5 4 17.8 3 16 3z"/><path fill="#fff" d="M10.5 7c-.8 0-1.5.7-1.5 1.5S9.7 10 10.5 10s1.5-.7 1.5-1.5S11.3 7 10.5 7zm11 0c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5S22.3 7 21.5 7z"/><path fill="#fff" d="M10.5 8.5c-.3 0-.5.2-.5.5s.2.5.5.5.5-.2.5-.5-.2-.5-.5-.5zm11 0c-.3 0-.5.2-.5.5s.2.5.5.5.5-.2.5-.5-.2-.5-.5-.5z"/></svg>`,

  trino:  c => `<svg viewBox="0 0 24 24" width="15" height="15" fill="${c}"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 3c3.86 0 7 3.14 7 7s-3.14 7-7 7-7-3.14-7-7 3.14-7 7-7z"/><circle cx="12" cy="12" r="3"/></svg>`,

  dag:    c => `<svg viewBox="0 0 24 24" width="15" height="15" fill="${c}"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L19.34 8 12 11.82 4.66 8 12 4.18z"/></svg>`,
};

/* badge text */
function bdg(text,fg,bg){ return `<tspan dx="5" style="font-size:7.5px;font-weight:700;fill:${fg};"> ${text}</tspan>`; }
const B = {
  KAFKA: bdg('KAFKA',C.kafka),  RW: bdg('RW',C.rw),  'RW MV': bdg('RW',C.rwmv),
  ICE: bdg('ICE',C.ice), ICEBERG: bdg('ICEBERG',C.ice), PG: bdg('PG',C.pg), MINIO: bdg('MINIO',C.minio),
  PYTHON: bdg('PYTHON',C.py),
};

// ═══════════════════════════════════════════════════════════
//  NODES – positioned by column, rendering data flow L→R
//  type: 'app' = rounded-rect, 'data' = pill/stadium
// ═══════════════════════════════════════════════════════════

const NODES = [
  // COL 0 – Producer (far left)
  { id:'producer',        col:0, type:'app',  c:C.py,    logo:L.py,    lbl:'producer.py',               sub:'Python · configurable TPS',     tip:'Generates page_views, cart_events, purchases and pushes to Kafka.' },

  // COL 1 – Kafka input topics
  { id:'t-page',          col:1, type:'data', c:C.kafka,  logo:L.kafka, lbl:'page_views',                sub:'Kafka topic',          b:'KAFKA' },
  { id:'t-cart',          col:1, type:'data', c:C.kafka,  logo:L.kafka, lbl:'cart_events',               sub:'Kafka topic',          b:'KAFKA' },
  { id:'t-purchase',      col:1, type:'data', c:C.kafka,  logo:L.kafka, lbl:'purchases',                 sub:'Kafka topic',          b:'KAFKA' },

  // COL 2 – RW Sources
  { id:'src-page',        col:2, type:'data', c:C.rw,     logo:L.rw,    lbl:'src_page',                  sub:'RW source (append)',   b:'RW' },
  { id:'src-cart',        col:2, type:'data', c:C.rw,     logo:L.rw,    lbl:'src_cart',                  sub:'RW source (append)',   b:'RW' },
  { id:'src-purchase',    col:2, type:'data', c:C.rw,     logo:L.rw,    lbl:'src_purchase',              sub:'RW source (append)',   b:'RW' },
  { id:'src-ice-country', col:2, type:'data', c:C.ice,    logo:L.rw,    lbl:'src_iceberg_countries',     sub:'Iceberg → RW source',  b:'ICEBERG' },

  // COL 3 – Funnel join/aggregate
  { id:'mv-summary',      col:3, type:'data', c:C.rwmv,   logo:L.rw,    lbl:'funnel_summary',            sub:'MV · 1 min tumble',    b:'RW MV', tip:'1-minute window aggregation. Main source for sinks.' },
  { id:'v-countries',     col:3, type:'data', c:C.rw,     logo:L.rw,    lbl:'rw_countries',              sub:'View · country snapshot',b:'RW' },

  // COL 4 – Downstream of funnel (summary, training, countries view)
  { id:'mv-funnel',       col:3, type:'data', c:C.rwmv,   logo:L.rw,    lbl:'funnel',                    sub:'MV · 20 s tumble',     b:'RW MV', tip:'Joins src_page/cart/purchase in 20s tumbling windows → viewers, carters, purchasers, rates.', rowOff:2 },
  { id:'mv-training',     col:4, type:'data', c:C.rwmv,   logo:L.rw,    lbl:'funnel_training',           sub:'MV · + time & lag feats',b:'RW MV',tip:'+ hour, minute, day_of_week, lag_1..3 for ML.', rowOff:4 },

  // COL 5 – Views, UDFs, kafka sink, iceberg MV
  { id:'sink-kafka',      col:6, type:'data', c:C.kafka,  logo:L.rw,    lbl:'funnel_kafka_sink',         sub:'RW sink → Kafka topic', b:'KAFKA' },
  { id:'v-country',       col:4, type:'data', c:C.rw,     logo:L.rw,    lbl:'funnel_summary_with_country',sub:'View · + country join', b:'RW' },
  { id:'udf',             col:3, type:'app',  c:C.py,     logo:L.rw,    lbl:'Python UDFs',               sub:'conversion, score, emoji…', b:'PYTHON', rowOff:-1 },
  { id:'v-enriched',      col:5, type:'data', c:C.rw,     logo:L.rw,    lbl:'funnel_enriched',           sub:'View · + Python UDFs',  b:'RW', tip:'UDF columns: conversion_category, funnel_score, rate_emoji, funnel_health.', rowOff:2 },
  { id:'mv-ice',          col:5, type:'data', c:C.rwmv,   logo:L.rw,    lbl:'funnel_for_iceberg',        sub:'MV · DOUBLE cast',     b:'RW MV', rowOff:3 },

  // COL 6 – Sinks and output
  { id:'t-funnel',        col:7, type:'data', c:C.kafka,  logo:L.kafka, lbl:'funnel',                     sub:'Kafka topic',            b:'KAFKA', tip:'Consumed by dashboard backend as SSE.' },
  { id:'sink-pg',         col:6, type:'data', c:C.pg,     logo:L.rw,    lbl:'funnel_postgres_sink',      sub:'RW sink → PostgreSQL',   b:'PG', rowOff:2 },
  { id:'sink-iceberg',    col:6, type:'data', c:C.ice,    logo:L.rw,    lbl:'iceberg_funnel_sink',       sub:'RW sink → Iceberg',      b:'ICEBERG', rowOff:2 },

  // COL 7 – ML training/online, external stores
  { id:'ml-online',       col:5, type:'app',  c:C.ml,     logo:L.ml,    lbl:'Online Learning',           sub:'River · incremental',   tip:'Continuous learning from funnel_summary. Checkpoints → MinIO.', lane:'ml' },
  { id:'ml-train',        col:5, type:'app',  c:C.ml,     logo:L.ml,    lbl:'ML Training',               sub:'sklearn · RF + LR',     tip:'Batch training from funnel_training MV. Models → MinIO.', lane:'ml' },
  { id:'ice-funnel',      col:7, type:'data', c:C.ice,    logo:L.ice,   lbl:'iceberg_funnel',            sub:'Table - MinIO',           b:'ICEBERG',   tip:'Long-term OLAP storage. PK: window_start. Via Trino.', lane:'ice' },
  { id:'pg-table',        col:7, type:'data', c:C.pg,     logo:L.pg,    lbl:'funnel_summary_with_country',sub:'PostgreSQL table',       b:'PG', lane:'pg' },
  { id:'ice-countries',   col:1, type:'data', c:C.ice,    logo:L.ice,   lbl:'iceberg_countries',         sub:'Table - MinIO',      b:'ICEBERG', lane:'ice' },

  // COL 8 – ML serving
  { id:'ml-serving',      col:6, type:'app',  c:C.ml,     logo:L.ml,    lbl:'ML Serving',                sub:'FastAPI · port 8001',   tip:'Dual-mode: batch + online. Auto-reload 60s.', lane:'ml' },

  // COL 9 – Backend API endpoints
  { id:'api-stream',      col:8, type:'app',  c:C.api,    logo:L.api,   lbl:'/api/funnel/stream',        sub:'SSE real-time' },
  { id:'api-query',       col:8, type:'app',  c:C.api,    logo:L.api,   lbl:'/api/query/funnel',         sub:'Historical data' },
  { id:'api-enriched',    col:8, type:'app',  c:C.api,    logo:L.api,   lbl:'/api/funnel/enriched',      sub:'UDF metrics' },
  { id:'api-predict',     col:8, type:'app',  c:C.api,    logo:L.api,   lbl:'/api/predictions/*',        sub:'ML predictions', lane:'ml' },

  // COL 10 – Frontend tabs (far right, matching API order)
  { id:'tab-dashboard',   col:9, type:'app',  c:C.fe,     logo:L.fe,    lbl:'📊 Dashboard Tab',          sub:'Real-time funnel metrics', tip:'Live funnel viz, Recharts, SSE, producer controls.' },
  { id:'tab-queries',     col:9, type:'app',  c:C.fe,     logo:L.fe,    lbl:'🔍 Queries Tab',            sub:'Historical query UI',      tip:'Time-range select, per-min records, aggregates.' },
  { id:'tab-enriched',    col:9, type:'app',  c:C.fe,     logo:L.fe,    lbl:'✨ Enriched Funnel Tab',     sub:'UDF-enriched analytics',   tip:'category, score, emoji, health from Python UDFs.' },
  { id:'tab-predictions', col:9, type:'app',  c:C.fe,     logo:L.fe,    lbl:'🔮 Predictions Tab',        sub:'ML predictions & compare', tip:'Next-min predictions, actual vs predicted, history.', lane:'ml' },
];

// ═══════════════════════════════════════════════════════════
//  EDGES – [source, target, colour]
// ═══════════════════════════════════════════════════════════
const EDGES = [
  // Producer → Kafka
  ['producer','t-page',C.py], ['producer','t-cart',C.py], ['producer','t-purchase',C.py],
  // Kafka → RW sources
  ['t-page','src-page',C.kafka], ['t-cart','src-cart',C.kafka], ['t-purchase','src-purchase',C.kafka],
  // Sources → funnel MV
  ['src-page','mv-funnel',C.rw], ['src-cart','mv-funnel',C.rw], ['src-purchase','mv-funnel',C.rw],
  // funnel → downstream MVs
  ['mv-funnel','mv-training',C.rwmv],
  // summary reads from sources directly
  ['src-page','mv-summary',C.rw], ['src-cart','mv-summary',C.rw], ['src-purchase','mv-summary',C.rw],
  // summary → further
  ['mv-summary','mv-ice',C.rwmv], ['mv-summary','v-country',C.rwmv],
  // countries
  ['src-ice-country','v-countries',C.ice], ['v-countries','v-country',C.rw],
  // enriched
  ['v-country','v-enriched',C.rw], ['udf','v-enriched',C.py],
  // MVs → sinks
  ['mv-summary','sink-kafka',C.rwmv], ['mv-ice','sink-iceberg',C.ice], ['v-country','sink-pg',C.pg],
  // sinks → external
  ['sink-kafka','t-funnel',C.kafka], ['sink-iceberg','ice-funnel',C.ice], ['sink-pg','pg-table',C.pg],
  // Iceberg countries reference
  ['ice-countries','src-ice-country',C.ice],
  // external → consumers
  ['t-funnel','api-stream',C.kafka],
  // ML flow
  ['mv-training','ml-train',C.ml], ['mv-summary','ml-online',C.ml],
  ['ml-train','ml-serving',C.ml], ['ml-online','ml-serving',C.ml],
  ['ml-serving','api-predict',C.ml],
  // RW direct → API
  ['v-enriched','api-enriched',C.rw],
  ['v-country','api-query',C.rw],
  // API → Frontend tabs (matching reordered positions)
  ['api-stream','tab-dashboard',C.kafka,'PUSH (SSE)'],
  ['api-query','tab-queries','#4ade80','PULL'], ['api-predict','tab-predictions','#60a5fa','POLL'],
  ['api-enriched','tab-enriched','#60a5fa','POLL'],
];

const COL_LABELS = [
  'Producer','Kafka Topics','Sources','',
  'Realtime Processing, Storage & Serving','','Sinks','OTHER STORAGE',
  'Backend','Frontend',
];

// ═══════════════════════════════════════════════════════════
//  LAYOUT – Three horizontal lanes: Main, ML, Iceberg/External
// ═══════════════════════════════════════════════════════════
const LANE_GAP = 60; // vertical gap between lanes
const numCols = COL_LABELS.length;
const LANE_NAMES = ['main','ml','pg','ice'];
const LANE_LABELS = { ml:'ML Pipeline', pg:'PostgreSQL', ice:'Datalake / Iceberg' };
const LANE_COLORS = { ml:C.ml, pg:C.pg, ice:C.ice };

// Split nodes into lanes per column
const lanes = {};
LANE_NAMES.forEach(l => { lanes[l] = Array.from({length:numCols},()=>[]); });
NODES.forEach(n => lanes[n.lane||'main'][n.col].push(n));

const colX = [];
let cx = PAD_X;
for(let c=0;c<numCols;c++){ colX.push(cx); cx += NODE_W + COL_GAP; }
// Add extra space between backend (col 8) and frontend (col 9)
for(let c=9;c<numCols;c++){ colX[c] += 60; }
const totalW = cx - COL_GAP + PAD_X + 60;

// Compute height for each lane
function laneColH(laneNodes, includeHdr) {
  return laneNodes.map(ns => ns.length ? (includeHdr?COL_HDR:0) + ns.length*NODE_H + Math.max(0,ns.length-1)*ROW_GAP : 0);
}
const mainColH = laneColH(lanes.main, true);
const mlColH   = laneColH(lanes.ml,   false);
const pgColH   = laneColH(lanes.pg,   false);
const iceColH  = laneColH(lanes.ice,  false);
const maxMainH = Math.max(...mainColH, 0);
const maxMlH   = Math.max(...mlColH, 0);
const maxPgH   = Math.max(...pgColH, 0);
const maxIceH  = Math.max(...iceColH, 0);

// Vertical zone positions
const mainY0 = PAD_Y;
const mainEnd = mainY0 + maxMainH;
const mlY0 = maxMlH > 0 ? mainEnd + LANE_GAP : mainEnd;
const mlEnd = mlY0 + maxMlH;
const NARROW_GAP = 50;
const pgY0 = maxPgH > 0 ? mlEnd + NARROW_GAP : mlEnd;
const pgEnd = pgY0 + maxPgH;
const iceY0 = maxIceH > 0 ? pgEnd + NARROW_GAP : pgEnd;
const iceEnd = iceY0 + maxIceH;
const totalH = iceEnd + PAD_Y;

const nodeMap = {};

// Position main lane nodes (top-aligned so row 0 nodes form a straight line)
let actualMainEnd = mainEnd;
lanes.main.forEach((nodes,c) => {
  const y0 = mainY0 + COL_HDR;
  nodes.forEach((n,i) => {
    n.x = colX[c] + (n.xOff||0);
    n.y = y0 + i*(NODE_H+ROW_GAP) + (n.rowOff||0)*(NODE_H+ROW_GAP);
    actualMainEnd = Math.max(actualMainEnd, n.y + NODE_H);
    nodeMap[n.id] = n;
  });
});

// Recalculate lane positions based on actual main lane bottom
const mlY0Real = maxMlH > 0 ? actualMainEnd + LANE_GAP : actualMainEnd;
const mlEndReal = mlY0Real + maxMlH;
const pgY0Real = maxPgH > 0 ? mlEndReal + NARROW_GAP : mlEndReal;
const pgEndReal = pgY0Real + maxPgH;
const iceY0Real = maxIceH > 0 ? pgEndReal + NARROW_GAP : pgEndReal;
const iceEndReal = iceY0Real + maxIceH;

// Position ML lane nodes
lanes.ml.forEach((nodes,c) => {
  const h = mlColH[c];
  const y0 = mlY0Real + (maxMlH - h)/2;
  nodes.forEach((n,i) => {
    n.x = colX[c];
    n.y = y0 + i*(NODE_H+ROW_GAP);
    nodeMap[n.id] = n;
  });
});
// Position PG lane nodes
lanes.pg.forEach((nodes,c) => {
  const h = pgColH[c];
  const y0 = pgY0Real + (maxPgH - h)/2;
  nodes.forEach((n,i) => {
    n.x = colX[c];
    n.y = y0 + i*(NODE_H+ROW_GAP);
    nodeMap[n.id] = n;
  });
});
// Position ice lane nodes
lanes.ice.forEach((nodes,c) => {
  const h = iceColH[c];
  const y0 = iceY0Real + (maxIceH - h)/2;
  nodes.forEach((n,i) => {
    n.x = colX[c];
    n.y = y0 + i*(NODE_H+ROW_GAP);
    nodeMap[n.id] = n;
  });
});

// ═══════════════════════════════════════════════════════════
//  RENDER SVG
// ═══════════════════════════════════════════════════════════
const svg = document.getElementById('archSvg');
const wrapper = document.querySelector('.svg-wrap');
const totalHReal = iceEndReal + PAD_Y;
svg.setAttribute('width', totalW);
svg.setAttribute('height', totalHReal);
svg.setAttribute('viewBox',`0 0 ${totalW} ${totalHReal}`);

let S = '';



// RisingWave background highlight (cols 2–6)
{
  const rwX = colX[2] - COL_GAP/2 + 2;
  const rwW = (colX[6] + NODE_W + COL_GAP/2 - 2) - rwX;
  const rwPad = 8;
  const rwTop = PAD_Y - rwPad - 12;
  const rwBottom = mlY0Real - LANE_GAP/2 - 12;
  S += `<rect x="${rwX}" y="${rwTop}" width="${rwW}" height="${rwBottom - rwTop}" rx="12" fill="#93c5fd40" stroke="#3b82f680" stroke-width="1.5"/>`;
  S += `<text x="${rwX + rwW/2}" y="${PAD_Y - rwPad + 2}" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700" letter-spacing=".08em" opacity=".8" style="text-transform:uppercase">RisingWave</text>`;
}

// column labels – position at top of whichever lane has content
COL_LABELS.forEach((label,c) => {
  const lx = colX[c]+NODE_W/2;
  let ly;
  if(lanes.main[c].length) {
    ly = mainY0 + 14;
  } else if(lanes.ml[c].length) {
    const h = mlColH[c];
    ly = mlY0Real + (maxMlH - h)/2 - 6;
  } else if(lanes.pg[c].length) {
    const h = pgColH[c];
    ly = pgY0Real + (maxPgH - h)/2 - 6;
  } else if(lanes.ice[c].length) {
    const h = iceColH[c];
    ly = iceY0Real + (maxIceH - h)/2 - 6;
  } else {
    ly = mainY0 + 14;
  }
  S += `<text x="${lx}" y="${ly}" text-anchor="middle" fill="#6b7280" font-size="10" font-weight="700" letter-spacing=".06em" style="text-transform:uppercase">${label}</text>`;
});

// column separators
for(let c=1;c<numCols;c++){
  if(c===4 || c===5) continue; // skip dashed lines left/right of "Realtime Processing, Storage & Serving"
  const lx = colX[c]-COL_GAP/2;
  S += `<line x1="${lx}" y1="${PAD_Y-4}" x2="${lx}" y2="${totalHReal-PAD_Y+4}" stroke="#1e2130" stroke-width="1" stroke-dasharray="4,6"/>`;
}

// lane separators & labels
function drawLaneSep(yStart, label, color) {
  const sepY = yStart - NARROW_GAP/2;
  S += `<line x1="${PAD_X}" y1="${sepY}" x2="${totalW-PAD_X}" y2="${sepY}" stroke="${color}" stroke-width="1.5" stroke-dasharray="6,4"/>`;
  S += `<text x="${colX[5]}" y="${sepY+16}" text-anchor="start" fill="${color}" font-size="10" font-weight="700" letter-spacing=".08em" style="text-transform:uppercase">${label}</text>`;
}
if(maxMlH > 0)  drawLaneSep(mlY0Real,  LANE_LABELS.ml,  LANE_COLORS.ml);
if(maxPgH > 0)  drawLaneSep(pgY0Real,  LANE_LABELS.pg,  LANE_COLORS.pg);
if(maxIceH > 0) drawLaneSep(iceY0Real, LANE_LABELS.ice, LANE_COLORS.ice);

// edges – render with data attributes for hover highlighting
EDGES.forEach(([fid,tid,color,label],ei) => {
  const f=nodeMap[fid], t=nodeMap[tid];
  if(!f||!t) return;
  let x1,y1,x2,y2;
  if(f.col<t.col){
    x1=f.x+NODE_W; y1=f.y+NODE_H/2; x2=t.x; y2=t.y+NODE_H/2;
  } else if(f.col>t.col){
    x1=f.x; y1=f.y+NODE_H/2; x2=t.x+NODE_W; y2=t.y+NODE_H/2;
  } else {
    x1=f.x+NODE_W/2; y1=f.y+NODE_H; x2=t.x+NODE_W/2; y2=t.y;
  }
  const dx=Math.abs(x2-x1), cpx=Math.max(dx*.18,10);
  const dirX=x2>x1?1:-1;
  const arrow = `M${x2},${y2} L${x2-5*dirX},${y2-3} M${x2},${y2} L${x2-5*dirX},${y2+3}`;
  S += `<path d="M${x1},${y1} C${x1+cpx*dirX},${y1} ${x2-cpx*dirX},${y2} ${x2},${y2} ${arrow}" stroke="${color}" stroke-width="1.6" fill="none" opacity=".72" class="edge" data-from="${fid}" data-to="${tid}" data-color="${color}"/>`;
  if(label){
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const lw = label.length * 5 + 10;
    S += `<rect x="${mx-lw/2}" y="${my-8}" width="${lw}" height="14" rx="3" fill="#1a1d27" stroke="${color}" stroke-width=".8" opacity=".85"/>`;
    S += `<text x="${mx}" y="${my+3}" fill="${color}" font-size="8" font-weight="700" text-anchor="middle" opacity=".9">${label}</text>`;
  }
});

// nodes
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mix(h1,h2,t){
  const p=s=>[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];
  const[a,b]=[p(h1),p(h2)];
  return '#'+a.map((v,i)=>Math.round(v*(1-t)+b[i]*t).toString(16).padStart(2,'0')).join('');
}

NODES.forEach(n => {
  const isData = n.type==='data';
  const rx = isData ? NODE_H/2 : 10;
  const bc = mix(n.c,'#2a2d3a',.45);

  // bg
  S += `<rect x="${n.x}" y="${n.y}" width="${NODE_W}" height="${NODE_H}" rx="${rx}" fill="#1a1d27" stroke="${bc}" stroke-width="1.5" class="nr" data-id="${n.id}"/>`;
  // accent bar
  const bx = n.x+(isData?10:1);
  S += `<rect x="${bx}" y="${n.y+NODE_H*.18}" width="3" height="${NODE_H*.64}" rx="2" fill="${n.c}"/>`;
  // logo
  S += `<foreignObject x="${n.x+16}" y="${n.y+10}" width="17" height="17" data-nid="${n.id}">${n.logo(n.c)}</foreignObject>`;
  // label + badge
  const badgeStr = n.b ? (B[n.b]||'') : '';
  S += `<text x="${n.x+37}" y="${n.y+21}" fill="#e1e4ed" font-size="11.5" font-weight="600" data-nid="${n.id}">${esc(n.lbl)}${badgeStr}</text>`;
  // sub
  S += `<text x="${n.x+37}" y="${n.y+36}" fill="#8b8fa3" font-size="9.5" data-nid="${n.id}">${esc(n.sub)}</text>`;
  // hover target
  S += `<rect x="${n.x}" y="${n.y}" width="${NODE_W}" height="${NODE_H}" rx="${rx}" fill="transparent" class="nh" data-id="${n.id}" style="cursor:default"/>`;
});

svg.innerHTML = S;

// ═══════════════════════════════════════════════════════════
//  HOVER HIGHLIGHTING – trace upstream & downstream
// ═══════════════════════════════════════════════════════════

// Build adjacency lists
const downstream = {}, upstream = {}; // nodeId → Set of nodeIds
NODES.forEach(n => { downstream[n.id] = new Set(); upstream[n.id] = new Set(); });
EDGES.forEach(([f,t]) => { if(downstream[f] && upstream[t]){ downstream[f].add(t); upstream[t].add(f); }});

// BFS to collect all connected nodes in a direction
function traceAll(startId) {
  const visited = new Set([startId]);
  // trace downstream
  let queue = [...downstream[startId] || []];
  while(queue.length){ const id=queue.shift(); if(!visited.has(id)){ visited.add(id); for(const next of downstream[id]||[]) queue.push(next); }}
  // trace upstream
  queue = [...upstream[startId] || []];
  while(queue.length){ const id=queue.shift(); if(!visited.has(id)){ visited.add(id); for(const prev of upstream[id]||[]) queue.push(prev); }}
  return visited;
}

// Collect all edge elements and node elements
const edgeEls = svg.querySelectorAll('.edge');
const nodeRects = svg.querySelectorAll('.nr');
const nodeHovers = svg.querySelectorAll('.nh');

function highlightNode(nodeId) {
  const connected = traceAll(nodeId);
  // Dim all nodes
  nodeRects.forEach(el => {
    if(connected.has(el.dataset.id)){
      el.setAttribute('stroke-width','2.5');
      el.style.filter = 'drop-shadow(0 0 6px rgba(140,150,255,.35))';
      el.setAttribute('opacity','1');
    } else {
      el.setAttribute('opacity','.2');
      el.style.filter = '';
    }
  });
  // Bold connected edges, keep others visible
  edgeEls.forEach(el => {
    const f = el.dataset.from, t = el.dataset.to;
    if(connected.has(f) && connected.has(t)){
      el.setAttribute('stroke-width','2.8');
      el.setAttribute('opacity','.95');
    } else {
      el.setAttribute('stroke-width','1.2');
      el.setAttribute('opacity','.35');
    }
  });
  // Dim text associated with non-connected nodes
  svg.querySelectorAll('text[data-nid]').forEach(el => {
    el.setAttribute('opacity', connected.has(el.dataset.nid) ? '1' : '.15');
  });
  svg.querySelectorAll('foreignObject[data-nid]').forEach(el => {
    el.setAttribute('opacity', connected.has(el.dataset.nid) ? '1' : '.15');
  });
}

function clearHighlight() {
  nodeRects.forEach(el => {
    el.setAttribute('stroke-width','1.5');
    el.setAttribute('opacity','1');
    el.style.filter = '';
  });
  edgeEls.forEach(el => {
    el.setAttribute('stroke-width','1.6');
    el.setAttribute('opacity','.72');
  });
  svg.querySelectorAll('text[data-nid]').forEach(el => el.setAttribute('opacity','1'));
  svg.querySelectorAll('foreignObject[data-nid]').forEach(el => el.setAttribute('opacity','1'));
}

// tooltip + highlight
const tip = document.getElementById('archTooltip');
const tipMap = {}; NODES.forEach(n=>{ if(n.tip) tipMap[n.id]=n.tip; });
nodeHovers.forEach(el => {
  el.addEventListener('mouseenter', () => {
    const id = el.dataset.id;
    highlightNode(id);
    const t = tipMap[id]; if(t){ tip.textContent = t; tip.style.display='block'; }
  });
  el.addEventListener('mousemove', e => {
    tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-10)+'px';
  });
  el.addEventListener('mouseleave', () => {
    clearHighlight();
    tip.style.display='none';
  });
});

// ═══════════════════════════════════════════════════════════
//  DRAG TO PAN – click empty space and drag to scroll (all directions)
// ═══════════════════════════════════════════════════════════

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragScrollLeft = 0;
let dragScrollTop = 0;

function startDrag(e, target) {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragScrollLeft = wrapper.scrollLeft;
  dragScrollTop = wrapper.scrollTop;
  target.style.cursor = 'grabbing';
  e.preventDefault();
}

function onMouseMove(e) {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  wrapper.scrollLeft = dragScrollLeft - dx;
  wrapper.scrollTop = dragScrollTop - dy;
}

function onMouseUp() {
  if (isDragging) {
    isDragging = false;
    wrapper.style.cursor = '';
    svg.style.cursor = '';
  }
}

// Enable grab cursor on wrapper
wrapper.style.cursor = 'grab';

// Mouse events on wrapper (empty space)
wrapper.addEventListener('mousedown', e => {
  if (e.target === wrapper || e.target === svg) {
    startDrag(e, wrapper);
  }
});

// Mouse events on SVG background (but not on interactive elements)
svg.addEventListener('mousedown', e => {
  // Allow drag if clicking on SVG background, lane separators, or non-interactive elements
  const isInteractive = e.target.classList.contains('nh') || 
                        e.target.tagName === 'text' || 
                        e.target.tagName === 'foreignObject' ||
                        e.target.closest('foreignObject');
  if (!isInteractive && (e.target === svg || e.target.tagName === 'rect' || e.target.tagName === 'path')) {
    startDrag(e, svg);
  }
});

document.addEventListener('mousemove', onMouseMove);
document.addEventListener('mouseup', onMouseUp);
</script>
</body>
</html>
