x-image: &image
  image: ${RW_IMAGE:-risingwavelabs/risingwave:v3.0.0}

x-lakekeeper-image: &lakekeeper-image
  image: ${LAKEKEEPER__SERVER_IMAGE:-quay.io/lakekeeper/catalog:v0.12.3}

x-lakekeeper-environment: &lakekeeper-environment
  - LAKEKEEPER__PG_ENCRYPTION_KEY=This-is-NOT-Secure!
  - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://postgres:postgres@lakekeeper-db:5432/postgres
  - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://postgres:postgres@lakekeeper-db:5432/postgres
  - LAKEKEEPER__AUTHZ_BACKEND=allowall
  # Externally taken from environment variables if set
  - LAKEKEEPER__OPENID_PROVIDER_URI
  - LAKEKEEPER__OPENID_AUDIENCE
  - LAKEKEEPER__OPENID_ADDITIONAL_ISSUERS
  - LAKEKEEPER__UI__OPENID_CLIENT_ID
  - LAKEKEEPER__UI__OPENID_SCOPE
  # Disable OrbStack-injected HTTP proxy. Lakekeeper writes Iceberg metadata
  # to MinIO over HTTP; routing those through proxyproxy.orb.internal would
  # hang because the proxy cannot resolve docker-network hostnames.
  - HTTP_PROXY=
  - HTTPS_PROXY=
  - ALL_PROXY=
  - http_proxy=
  - https_proxy=
  - all_proxy=
  - NO_PROXY=*
  - no_proxy=*

x-dagster-build: &dagster-build
  image: ${DAGSTER_IMAGE:-risingwave-test/dagster:local}
  build:
    context: .
    dockerfile: Dockerfile.dagster

services:
  # RisingWave Services - Distributed Mode
  compactor-0:
    <<: *image
    init: true
    command:
      - compactor-node
      - "--listen-addr"
      - "0.0.0.0:6660"
      - "--advertise-addr"
      - "compactor-0:6660"
      - "--prometheus-listener-addr"
      - "0.0.0.0:1260"
      - "--meta-address"
      - "http://meta-node-0:5690"
      - "--config-path"
      - /risingwave.toml
    expose:
      - "6660"
      - "1260"
    ports: []
    depends_on:
      - meta-node-0
    volumes:
      - "./risingwave.toml:/risingwave.toml"
      # Shared local-fs Hummock state store (§16).
      - "hummock-fs-store:/root/state_store"
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      # Clear OrbStack-injected HTTP proxy. RisingWave's S3 uploader honors
      # HTTP(S)_PROXY env vars and would route http://minio-0:9301 writes through
      # proxyproxy.orb.internal, which kills the connection mid-upload.
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    container_name: compactor-0
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/6660; exit $$?;'
      interval: 1s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      iceberg_net:

  compactor-1:
    <<: *image
    command:
      - compactor-node
      - "--listen-addr"
      - "0.0.0.0:6661"
      - "--advertise-addr"
      - "compactor-1:6661"
      - "--prometheus-listener-addr"
      - "0.0.0.0:1261"
      - "--meta-address"
      - "http://meta-node-0:5690"
      - "--compactor-mode"
      - "dedicated-iceberg"
      - "--config-path"
      - /risingwave.toml
    expose:
      - "6661"
      - "1261"
    ports: [ ]
    depends_on:
      - meta-node-0
    volumes:
      - "./risingwave.toml:/risingwave.toml"
      # Shared local-fs Hummock state store (§16).
      - "hummock-fs-store:/root/state_store"
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      # Clear OrbStack-injected HTTP proxy (see compactor-0 above).
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    container_name: compactor-1
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/6661; exit $$?;'
      interval: 1s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      iceberg_net:

  compute-node-0:
    <<: *image
    init: true
    command:
      - compute-node
      - "--listen-addr"
      - "0.0.0.0:5688"
      - "--advertise-addr"
      - "compute-node-0:5688"
      - "--prometheus-listener-addr"
      - "0.0.0.0:1222"
      - "--meta-address"
      - "http://meta-node-0:5690"
      - "--config-path"
      - /risingwave.toml
    expose:
      - "5688"
      - "1222"
    ports: []
    depends_on:
      - meta-node-0
    volumes:
      - "./risingwave.toml:/risingwave.toml"
      # Expose compiled protobuf FileDescriptorSet for ENCODE PROTOBUF
      # (schema.location='file:///proto/events.pb') tests.
      - "./proto:/proto:ro"
      # Shared local-fs Hummock state store (§16).
      - "hummock-fs-store:/root/state_store"
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      # Clear OrbStack-injected HTTP proxy (see compactor-0 above).
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
      AWS_DEFAULT_REGION: "us-east-1"
      JVM_HEAP_SIZE: "2g"
    container_name: compute-node-0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/5688; exit $$?;'
      interval: 1s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      iceberg_net:

  frontend-node-0:
    <<: *image
    init: true
    command:
      - frontend-node
      - "--listen-addr"
      - "0.0.0.0:4566"
      - "--meta-addr"
      - "http://meta-node-0:5690"
      - "--advertise-addr"
      - "frontend-node-0:4566"
      - "--config-path"
      - /risingwave.toml
      - "--prometheus-listener-addr"
      - "0.0.0.0:2222"
    expose:
      - "4566"
    ports:
      - "4566:4566"
    depends_on:
      - meta-node-0
    volumes:
      - "./risingwave.toml:/risingwave.toml"
      # See compute-node-0: file-descriptor protobuf schema for tests.
      - "./proto:/proto:ro"
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      # Clear OrbStack-injected HTTP proxy (see compactor-0 above).
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    container_name: frontend-node-0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf "GET / HTTP/1.1\n\n" > /dev/tcp/127.0.0.1/4566; exit $$?;'
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      iceberg_net:

  meta-node-0:
    <<: *image
    init: true
    command:
      - meta-node
      - "--listen-addr"
      - "0.0.0.0:5690"
      - "--advertise-addr"
      - "meta-node-0:5690"
      - "--dashboard-host"
      - "0.0.0.0:5691"
      - "--prometheus-host"
      - "0.0.0.0:1250"
      - "--prometheus-endpoint"
      - "http://prometheus-0:9500"
      - "--backend"
      - sql
      - "--sql-endpoint"
      - "postgres://postgres:@postgres-0:5432/metadata"
      - "--state-store"
      # Local-fs Hummock state store (demo-only) — removes the MinIO/HTTP + CPU layer for the heavy
      # state-store churn; MinIO stays for Iceberg + proto. See BRAZIL_WORKLOAD_TUNING.md §16.
      - "hummock+fs:///root/state_store"
      - "--data-directory"
      - "hummock_001"
      - "--config-path"
      - /risingwave.toml
    expose:
      - "5690"
      - "1250"
      - "5691"
    ports:
      - "5690:5690"
      - "5691:5691"
    depends_on:
      - "postgres-0"
      - "minio-0"
    volumes:
      - "./risingwave.toml:/risingwave.toml"
      # See compute-node-0: file-descriptor protobuf schema for tests.
      - "./proto:/proto:ro"
      # Shared local-fs Hummock state store (§16). Same volume+path on every RW node.
      - "hummock-fs-store:/root/state_store"
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      RW_TELEMETRY_TYPE: ${RW_TELEMETRY_TYPE:-"docker-compose"}
      RW_SECRET_STORE_PRIVATE_KEY_HEX: ${RW_SECRET_STORE_PRIVATE_KEY_HEX:-0123456789abcdef0123456789abcdef}
      RW_LICENSE_KEY: ${RISINGWAVE_LICENSE_KEY:-}
      # Clear OrbStack-injected HTTP proxy (see compactor-0 above).
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    container_name: meta-node-0
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/5690; exit $$?;'
      interval: 1s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      iceberg_net:

  
  postgres-0:
    image: "postgres:17-alpine"
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=postgres
      - POSTGRES_DB=metadata
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    expose:
      - "5432"
    ports:
      - "8432:5432"
    volumes:
      - "postgres-0:/var/lib/postgresql/data"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      iceberg_net:

  minio-0:
    image: "quay.io/minio/minio:latest"
    command:
      - server
      - "--address"
      - "0.0.0.0:9301"
      - "--console-address"
      - "0.0.0.0:9400"
      - /data
    expose:
      - "9301"
      - "9400"
    ports:
      - "9301:9301"
      - "9400:9400"
    volumes:
      - "minio-0:/data"
    entrypoint: |
      /bin/sh -c '
      set -e
      mkdir -p "/data/hummock001"
      /usr/bin/docker-entrypoint.sh "$$0" "$$@"
      '
    environment:
      MINIO_CI_CD: "1"
      MINIO_PROMETHEUS_AUTH_TYPE: public
      MINIO_PROMETHEUS_URL: "http://prometheus-0:9500"
      MINIO_ROOT_PASSWORD: hummockadmin
      MINIO_ROOT_USER: hummockadmin
      MINIO_DOMAIN: "minio-0"
      # Experiment (2026-06): deprioritize the background data scanner so more
      # CPU/IO goes to serving Hummock + Iceberg writes. MinIO already pauses the
      # scanner for I/O by default, so the gain is expected to be small — kept as
      # a cheap, low-risk knob to measure. See BRAZIL_WORKLOAD_TUNING.md §12.
      MINIO_SCANNER_SPEED: slowest
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    container_name: minio-0
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf "GET / HTTP/1.1\n\n" > /dev/tcp/127.0.0.1/9301; exit $$?;'
      interval: 1s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          # Trimmed 4G -> 1.5G: 4G was oversized for a local single-node MinIO.
          # OrbStack caps at ~11.7 GB, so the budget is tight (§12).
          memory: 1536M
        reservations:
          memory: 512M
    networks:
      iceberg_net:

  # Lakekeeper Services
  lakekeeper:
    <<: *lakekeeper-image
    environment: *lakekeeper-environment
    command: [ "serve" ]
    healthcheck:
      test: [ "CMD", "/home/nonroot/lakekeeper", "healthcheck" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    container_name: lakekeeper
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      iceberg_net:

  lakekeeper-bootstrap:
    image: alpine:3.23.4
    restart: "no"
    depends_on:
      lakekeeper:
        condition: service_healthy
    networks:
      iceberg_net:
    volumes:
      - "./bin/bootstrap_lakekeeper.sh:/bootstrap.sh:ro"
    command: sh /bootstrap.sh
  lakekeeper-migrate:
    <<: *lakekeeper-image
    environment: *lakekeeper-environment
    restart: "no"
    command: [ "migrate" ]
    depends_on:
      lakekeeper-db:
        condition: service_healthy
    container_name: lakekeeper-migrate
    networks:
      iceberg_net:

  lakekeeper-db:
    image: "postgres:17-alpine"
    environment:
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    ports:
      - "8433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5432 -d postgres" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: always
    volumes:
      - "lakekeeper-db:/var/lib/postgresql/data/pgdata"
    container_name: lakekeeper-db
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      iceberg_net:

  # Redpanda Service - Kafka Compatible
  # redpanda:
  #   image: redpandadata/redpanda:v26.1.10
  #   command:
  #     - redpanda
  #     - start
  #     - "--kafka-addr=0.0.0.0:9092"
  #     - "--advertise-kafka-addr=redpanda:9092"  # Keep internal hostname but use correct port
  #     - "--pandaproxy-addr=0.0.0.0:8082"        # Use 8082 (dev default) instead of 8081
  #     - "--advertise-pandaproxy-addr=redpanda:8082"  # Keep internal hostname
  #     - "--schema-registry-addr=0.0.0.0:8081"   # Schema Registry on 8081 (default)
  #     - "--rpc-addr=0.0.0.0:33146"
  #     - "--advertise-rpc-addr=redpanda:33146"   # Keep internal hostname
  #     - "--mode=dev-container"
  #     - "--overprovisioned"
  #     - "--smp=1"
  #     - "--memory=1G"
  #     - "--reserve-memory=0M"
  #     - "--check=false"
  #   expose:
  #     - "9092"    # Kafka API
  #     - "8081"    # Schema Registry
  #     - "8082"    # HTTP Proxy (Pandaproxy)
  #     - "33146"   # RPC API
  #   ports:
  #     - "9092:9092"      # Map external 9092 to internal 9092
  #     - "8081:8081"      # Schema Registry
  #     - "8082:8082"      # HTTP Proxy (Pandaproxy)
  #     - "33146:33146"
  #     - "9644:9644"      # Schema Registry
  #   volumes:
  #     - "redpanda-data:/var/lib/redpanda/data"
  #   environment:
  #     - REDPANDA_DEV_MODE=true
  #     - REDPANDA_ENABLE_KAFKA_API=true
  #     - REDPANDA_ENABLE_SCHEMA_REGISTRY=true
  #   container_name: redpanda
  #   healthcheck:
  #     test: [ "CMD", "curl", "-f", "http://localhost:9644/v1/status" ]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 15s
  #   restart: always
  #   networks:
  #     iceberg_net:
  redpanda:
    image: redpandadata/redpanda:v26.1.10
    command:
      - redpanda
      - start
      - "--kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092"
      - "--advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092"
      - "--pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082"
      - "--advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082"
      - "--schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081"
      - "--rpc-addr=redpanda:33146"
      - "--advertise-rpc-addr=redpanda:33146"
      - "--mode=dev-container"
      - "--overprovisioned"
      - "--smp=1"
      - "--memory=1G"
      - "--reserve-memory=0M"
      - "--check=false"
    ports:
      - "19092:19092"  # External Kafka API (use this from Devbox/host)
      - "9092:9092"    # Internal Kafka API (for container-to-container)
      - "8081:8081"    # Schema Registry
      - "8082:8082"    # HTTP Proxy
      - "9644:9644"    # Admin API
    volumes:
      - "redpanda-data:/var/lib/redpanda/data"
    environment:
      - REDPANDA_DEV_MODE=true
      - REDPANDA_ENABLE_KAFKA_API=true
      - REDPANDA_ENABLE_SCHEMA_REGISTRY=true
    container_name: redpanda
    deploy:
      resources:
        limits:
          # Redpanda self-caps via --memory=1G; this bounds total RSS incl. page cache.
          memory: 1280M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9644/v1/brokers" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      iceberg_net:

  redpanda-console:
    image: redpandadata/console:latest
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "9090:8080"  # Access at http://localhost:9090
    environment:
      - KAFKA_BROKERS=redpanda:9092
      # Legacy keys (older console versions)
      - KAFKA_SCHEMAREGISTRY_ENABLED=true
      - KAFKA_SCHEMAREGISTRY_URLS=http://redpanda:8081
      # New top-level keys (console v2.x+)
      - SCHEMAREGISTRY_ENABLED=true
      - SCHEMAREGISTRY_URLS=http://redpanda:8081
    depends_on:
      - redpanda
    networks:
      iceberg_net:

  redpanda-init:
    image: redpandadata/redpanda:v26.1.10
    restart: "no"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      iceberg_net:
    entrypoint: ["/bin/bash", "-c"]
    command: ["set -e; echo 'Waiting for Redpanda...'; sleep 5; for topic in page_views cart_events purchases rw_poc_casino_out_avro; do echo \"Creating: $$topic\"; rpk topic create \"$$topic\" --brokers redpanda:9092 --partitions 1 --replicas 1 || true; done; echo 'Done!'"]

  prometheus-0:
    image: prom/prometheus:latest
    container_name: prometheus-0
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "9500:9500"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=0.0.0.0:9500"
    volumes:
      - "./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "prometheus-0:/prometheus"
    restart: always
    networks:
      - iceberg_net

  grafana-0:
    image: grafana/grafana:13.0.2
    container_name: grafana-0
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION=false
      - GF_INSTALL_PLUGINS=trino-datasource
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Anonymous access - no login needed for a demo
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
      # Dark mode
      - GF_USERS_DEFAULT_THEME=dark
      # RisingWave datasource connection.
      # GRAFANA_RISINGWAVE_HOST defaults to the Docker-network hostname for local stacks.
      # Set GRAFANA_RISINGWAVE_HOST in .env when pointing at a remote RisingWave instance.
      - RISINGWAVE_HOST=${GRAFANA_RISINGWAVE_HOST:-frontend-node-0}
      - RISINGWAVE_PORT=${RISINGWAVE_PORT:-4566}
      - RISINGWAVE_USER=${RISINGWAVE_USER:-root}
      - RISINGWAVE_PASSWORD=${RISINGWAVE_PASSWORD:-}
      - RISINGWAVE_DB=${RISINGWAVE_DB:-dev}
    volumes:
      - "grafana-0:/var/lib/grafana"
      - "./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro"
      - "./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro"
      - "./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro"
    depends_on:
      - prometheus-0
    restart: always
    networks:
      - iceberg_net

  # Dagster Services
  dagster-webserver:
    <<: *dagster-build
    entrypoint: ["/usr/local/bin/docker-entrypoint-dagster.sh"]
    command: ["dagster-webserver", "-m", "orchestration.definitions", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "3000:3000"
    environment:
      - DAGSTER_HOME=/workspace
      - PYTHONPATH=/workspace
      - DBT_HOST=frontend-node-0
      - DBT_PROFILES_DIR=/workspace/dbt
      - DBT_PASSWORD=root
      - MINIO_ENDPOINT=http://minio-0:9301
      - MINIO_ACCESS_KEY=hummockadmin
      - MINIO_SECRET_KEY=hummockadmin
      - RISINGWAVE_HOST=frontend-node-0
      - DBT_DATABRICKS_HOST=https://adb-1608121643336927.7.azuredatabricks.net
      - DATABRICKS_CATALOG=de_dev
      - DATABRICKS_SCHEMA=risingwave_poc
      - DATABRICKS_AZURE_TENANT_ID=78395483-9425-447a-ba64-60b90f6bb16e
      - DATABRICKS_AZURE_CLIENT_ID=3b7f531f-db93-4186-af75-6566c12c076b
      - DATABRICKS_AZURE_CLIENT_SECRET
      - ADLS_ACCOUNT_NAME=stkznneurwpoccdddevstd
      - ADLS_ACCOUNT_KEY
      # Disable OrbStack-injected HTTP proxy so in-network HTTP calls
      # (e.g. Trino, Lakekeeper, MinIO) bypass proxyproxy.orb.internal which
      # cannot resolve docker-network hostnames and returns HTTP 502.
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=*
      - no_proxy=*
    volumes:
      # Mount only specific directories needed by Dagster instead of entire project
      # This prevents root-owned files from being created in the project root
      - "./.env:/workspace/.env:ro"
      - "./orchestration:/workspace/orchestration:ro"
      - "./dbt:/workspace/dbt"
      - "./data:/workspace/data:ro"
      - "./scripts:/workspace/scripts:ro"
      - "dagster-storage:/workspace/dagster_storage"
      - "./pyproject.toml:/workspace/pyproject.toml:ro"
      - "./uv.lock:/workspace/uv.lock:ro"
    depends_on:
      frontend-node-0:
        condition: service_healthy
      redpanda:
        condition: service_started
      lakekeeper:
        condition: service_started
    networks:
      - iceberg_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: dagster-webserver
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/server_info"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: always

  dagster-daemon:
    <<: *dagster-build
    entrypoint: ["/usr/local/bin/docker-entrypoint-dagster.sh"]
    command: ["dagster-daemon", "run", "-m", "orchestration.definitions"]
    environment:
      - DAGSTER_HOME=/workspace
      - PYTHONPATH=/workspace
      - DBT_HOST=frontend-node-0
      - DBT_PROFILES_DIR=/workspace/dbt
      - DBT_PASSWORD=root
      - MINIO_ENDPOINT=http://minio-0:9301
      - MINIO_ACCESS_KEY=hummockadmin
      - MINIO_SECRET_KEY=hummockadmin
      - RISINGWAVE_HOST=frontend-node-0
      - DBT_DATABRICKS_HOST=https://adb-1608121643336927.7.azuredatabricks.net
      - DATABRICKS_CATALOG=de_dev
      - DATABRICKS_SCHEMA=risingwave_poc
      - DATABRICKS_AZURE_TENANT_ID=78395483-9425-447a-ba64-60b90f6bb16e
      - DATABRICKS_AZURE_CLIENT_ID=3b7f531f-db93-4186-af75-6566c12c076b
      - DATABRICKS_AZURE_CLIENT_SECRET
      - ADLS_ACCOUNT_NAME=stkznneurwpoccdddevstd
      - ADLS_ACCOUNT_KEY
      # Disable OrbStack-injected HTTP proxy (see dagster-webserver above).
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=*
      - no_proxy=*
    volumes:
      - "./.env:/workspace/.env:ro"
      - "./orchestration:/workspace/orchestration:ro"
      - "./dbt:/workspace/dbt"
      - "./data:/workspace/data:ro"
      - "./scripts:/workspace/scripts:ro"
      - "dagster-storage:/workspace/dagster_storage"
      - "./pyproject.toml:/workspace/pyproject.toml:ro"
      - "./uv.lock:/workspace/uv.lock:ro"
    depends_on:
      dagster-webserver:
        condition: service_healthy
      frontend-node-0:
        condition: service_healthy
    networks:
      - iceberg_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: dagster-daemon
    restart: always
    deploy:
      resources:
        limits:
          memory: 1536M

  # Trino - Iceberg SQL query engine with full CRUD support
  trino:
    image: trinodb/trino:481
    ports:
      - "9080:8080"
    environment:
      # Disable OrbStack-injected HTTP proxy. The AWS SDK v2 used by Trino's
      # native S3 client honors HTTPS_PROXY/HTTP_PROXY env vars and would route
      # http://minio-0:9301 and http://lakekeeper:8181 calls through
      # proxyproxy.orb.internal, which cannot resolve docker-network hostnames
      # and hangs / returns 502.
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - NO_PROXY=*
      - no_proxy=*
      # Databricks Unity Catalog credentials — used by trino/catalog/databricks.properties
      - DATABRICKS_AZURE_CLIENT_ID=3b7f531f-db93-4186-af75-6566c12c076b
      - DATABRICKS_AZURE_CLIENT_SECRET
      - ADLS_ACCOUNT_KEY
      # RisingWave catalog — used by trino/catalog/risingwave.properties
      # TRINO_RISINGWAVE_HOST defaults to the Docker-network hostname; set in .env for STG.
      - RISINGWAVE_HOST=${TRINO_RISINGWAVE_HOST:-frontend-node-0}
      - RISINGWAVE_PORT=${RISINGWAVE_PORT:-4566}
      - RISINGWAVE_USER=${RISINGWAVE_USER:-root}
      - RISINGWAVE_PASSWORD=${RISINGWAVE_PASSWORD:-}
      - RISINGWAVE_DB=${RISINGWAVE_DB:-dev}
    volumes:
      - type: bind
        source: ./trino/catalog
        target: /etc/trino/catalog
      - type: bind
        source: ./trino/config.properties
        target: /etc/trino/config.properties
        read_only: true
      # Scratch volume for spill-to-disk (see trino/config.properties). Backs the
      # node data dir /data/trino (trino-owned, so /data/trino/spill is writable).
      - "trino-data:/data/trino"
    depends_on:
      lakekeeper-bootstrap:
        condition: service_completed_successfully
      minio-0:
        condition: service_healthy
    networks:
      - iceberg_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: trino
    restart: always
    deploy:
      resources:
        limits:
          # Trino's image uses -XX:MaxRAMPercentage=80, so heap ≈ 80% of this
          # limit (~2.4G). WITHOUT a limit it sizes heap to 80% of the host
          # (~9.4G) and starves everything else. Cap is mandatory here.
          memory: 3G

