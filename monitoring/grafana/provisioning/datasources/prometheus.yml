apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-0:9500
    isDefault: true
    editable: true

  - name: RisingWave SQL
    uid: risingwave-sql
    type: postgres
    access: proxy
    url: "${RISINGWAVE_HOST}:${RISINGWAVE_PORT}"
    user: "${RISINGWAVE_USER}"
    editable: true
    jsonData:
      database: "${RISINGWAVE_DB}"
      postgresVersion: 1500
      sslmode: disable
      timescaledb: false
    secureJsonData:
      password: "${RISINGWAVE_PASSWORD}"

  - name: Metadata Postgres
    uid: metadata-postgres
    type: postgres
    access: proxy
    url: postgres-0:5432
    user: postgres
    editable: true
    jsonData:
      database: metadata
      postgresVersion: 1500
      sslmode: disable
      timescaledb: false

  - name: Trino
    uid: trino
    type: trino-datasource
    access: proxy
    url: http://trino:8080
    editable: true
    jsonData:
      catalog: datalake
      schema: public

  - name: Databricks via Trino
    uid: databricks-trino
    type: trino-datasource
    access: proxy
    url: http://trino:8080
    editable: true
    jsonData:
      catalog: databricks
      schema: rw_poc
