funnel_profile:
  target: dev
  outputs:
    dev:
      type: risingwave
      host: "{{ env_var('DBT_HOST', '127.0.0.1') }}"
      user: root
      password: "{{ env_var('DBT_PASSWORD', 'root') }}"
      dbname: dev
      port: 4566     # RisingWave default port
      schema: public
      # threads=2: raised from 1 on 2026-06-14 for testing. Was 1 due to JVM thread exhaustion
      # (concurrent Iceberg catalog calls across Lakekeeper + Unity Catalog crashing meta node).
      # 2 is the safe middle ground — halves build time vs 1, avoids the 4-thread blast radius.
      # If meta node crashes during dbt runs, revert to 1.
      threads: 2
