version: 2

# NOTE: RisingWave native Iceberg sources are working!
#
# The src_iceberg_countries source is a native RisingWave SOURCE that reads
# directly from the Iceberg table (created outside dbt). Changes made via Trino
# are automatically reflected in RisingWave without needing batch sync.
#
# Use vw_iceberg_countries (view) to get deduplicated data (latest snapshot only)
# Use mv_countries_from_iceberg (materialized view) for cached deduplicated data

sources:
  - name: risingwave
    database: dev
    schema: public
    tables:
      - name: src_iceberg_countries
        description: "Native RisingWave SOURCE that reads changelog from Iceberg table"
