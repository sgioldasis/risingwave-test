version: 2

# This defines the RisingWave native Iceberg source
# The source automatically reflects changes made via Trino
# See ICEBERG_RISINGWAVE_INTEGRATION.md for details

sources:
  - name: iceberg
    database: dev
    schema: public
    tables:
      - name: iceberg_countries
        identifier: src_iceberg_countries
        description: "Countries data from Iceberg via RisingWave native source (automatic refresh)"
        meta:
          dagster:
            deps: ['iceberg_countries']
        columns:
          - name: country
            data_type: varchar
            description: "Country code (e.g., GR, DE)"
          - name: country_name
            data_type: varchar
            description: "Full country name (e.g., Greece, Germany)"
