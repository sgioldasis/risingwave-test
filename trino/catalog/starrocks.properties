# StarRocks Catalog Configuration for Trino
# This allows Trino to query StarRocks using the MySQL connector

connector.name=mysql
connection-url=jdbc:mysql://starrocks-fe:9030
connection-user=root
connection-password=

# Optional: Reduce metadata caching for faster schema changes
metadata.cache-ttl=10s
metadata.cache-missing=false

# Optional: Case-insensitive name matching
case-insensitive-name-matching=true
