# RisingWave Catalog Configuration for Trino
# This allows Trino to query RisingWave as a PostgreSQL-compatible database.
# Connection target is controlled via TRINO_RISINGWAVE_HOST in .env (defaults to
# frontend-node-0 for local Docker; set to STG host when pointing at staging).

connector.name=postgresql
connection-url=jdbc:postgresql://${ENV:RISINGWAVE_HOST}:${ENV:RISINGWAVE_PORT}/${ENV:RISINGWAVE_DB}
connection-user=${ENV:RISINGWAVE_USER}
connection-password=${ENV:RISINGWAVE_PASSWORD}

# Reduce metadata caching to pick up schema changes faster
metadata.cache-ttl=10s
metadata.cache-missing=false
