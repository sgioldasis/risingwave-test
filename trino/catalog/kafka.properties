# Kafka Catalog Configuration for Trino
# Connects Trino's Kafka connector to Redpanda (Kafka-compatible broker)

connector.name=kafka
kafka.nodes=redpanda:9092

# Register topics as Kafka tables under schema `default`
kafka.default-schema=default
kafka.table-names=page_views,cart_events,purchases,funnel

# Use file-based table metadata for JSON topics
kafka.table-description-supplier=file
kafka.table-description-dir=/etc/trino/catalog/kafka

# Expose internal metadata columns like _partition_id and _message for debugging
kafka.hide-internal-columns=false
