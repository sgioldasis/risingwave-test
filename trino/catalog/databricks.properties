# Trino Iceberg Connector — Databricks Unity Catalog (IRC)
# Connects to de_dev.rw_poc via the Unity Catalog Iceberg REST API.
# Query example: SELECT * FROM databricks.rw_poc.rw_casino_transactions LIMIT 10;

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=https://adb-1608121643336927.7.azuredatabricks.net/api/2.1/unity-catalog/iceberg-rest
iceberg.rest-catalog.warehouse=de_dev

# OAuth2 — Azure AD service principal (same SP used by RisingWave sinks)
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.server-uri=https://login.microsoftonline.com/78395483-9425-447a-ba64-60b90f6bb16e/oauth2/v2.0/token
iceberg.rest-catalog.oauth2.credential=${ENV:DATABRICKS_AZURE_CLIENT_ID}:${ENV:DATABRICKS_AZURE_CLIENT_SECRET}
iceberg.rest-catalog.oauth2.scope=2ff814a6-3304-4ab8-85cb-cd0e6f879c1d/.default

# Azure ADLS Gen2 — direct Parquet access (stkznneurwpoccdddevstd)
# Credential vending (iceberg.rest-catalog.vended-credentials-enabled=true) does not work on
# Azure: Trino's fs.azure.enabled uses DefaultAzureCredential chain instead of the IRC-vended
# SAS token, so no ambient identity is found in Docker. Account key is the working alternative.
fs.native-azure.enabled=true
azure.auth-type=ACCESS_KEY
azure.access-key=${ENV:ADLS_ACCOUNT_KEY}
