coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080
catalog.management=dynamic
http-server.process-forwarded=true

# Spill-to-disk: large ad-hoc DBeaver queries (joins/aggregations/sorts) spill to disk
# instead of failing with "Query exceeded per-node memory limit" on the ~2.4G heap.
# Slower for spilled queries, but they complete. Path is the trino-data volume
# (/data/trino is trino-owned, so the spill subdir is writable). Bounded so spill
# can't fill the disk.
spill-enabled=true
spiller-spill-path=/data/trino/spill
max-spill-per-node=10GB
query-max-spill-per-node=4GB
